<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raqamlar — Qo'ng'iroqlar nazorati</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ============ LOGIN ============ -->
<section id="loginScreen" class="login-screen">
  <div class="sweep-field">
    <div class="sweep-line"></div>
    <div class="grid-dots"></div>
  </div>

  <div class="login-card">
    <div class="brand">
      <span class="brand-mark">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M6.5 3C5 3 4 4 4 5.5C4 14.5 9.5 20 18.5 20C20 20 21 19 21 17.5V15.2C21 14.4 20.4 13.7 19.6 13.6L15.9 13C15.3 12.9 14.7 13.1 14.3 13.6L13 15C10.7 13.8 8.9 12 7.7 9.7L9.1 8.4C9.6 8 9.8 7.4 9.7 6.8L9.1 3.9C8.9 3.1 8.2 2.5 7.4 2.5H6.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="brand-name">DISPATCH<span class="brand-accent">/OS</span></span>
    </div>

    <h1 class="login-title">Tizimga kirish</h1>
    <p class="login-sub">Qo'ng'iroqlar nazorati paneliga xush kelibsiz</p>

    <form id="loginForm" autocomplete="off">
      <label class="field">
        <span class="field-label">Elektron pochta</span>
        <input type="email" id="loginEmail" placeholder="ism@pochta.com" required>
      </label>
      <label class="field">
        <span class="field-label">Parol</span>
        <input type="password" id="loginPassword" placeholder="••••••••" required>
      </label>

      <p id="loginError" class="login-error" hidden></p>

      <button type="submit" id="loginSubmit" class="btn-primary btn-full">
        <span>Kirish</span>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8H13M13 8L9 4M13 8L9 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </form>
  </div>
</section>

<!-- ============ DASHBOARD ============ -->
<section id="dashboard" class="dashboard" hidden>
  <div class="app">

    <header class="app-header">
      <h1 class="app-title">Raqamlar</h1>
      <div class="header-actions">
        <button id="searchToggle" class="icon-btn-lg" title="Qidirish">
          <svg width="19" height="19" viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="6.5" stroke="currentColor" stroke-width="1.6"/><path d="M14 14L18 18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </button>
        <button id="logoutBtn" class="icon-btn-lg" title="Chiqish">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M8 4H5a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3M13 13.5L17 10L13 6.5M17 10H7.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </header>

    <div id="searchBar" class="search-bar">
      <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="6.5" stroke="currentColor" stroke-width="1.6"/><path d="M14 14L18 18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      <input type="text" id="searchInput" placeholder="Telefon raqami yoki ism bo'yicha qidirish" autocomplete="off">
    </div>

    <div class="filter-row">
      <select id="statusFilter">
        <option value="">Barcha holatlar</option>
        <option value="NEW">Yangi</option>
        <option value="IN_PROGRESS">Jarayonda</option>
        <option value="CONNECTED">Bog'landi</option>
        <option value="NO_ANSWER">Ko'tarilmadi</option>
        <option value="BUSY">Band (liniya)</option>
        <option value="CALLBACK_REQUIRED">Qayta aloqa kerak</option>
        <option value="WRONG_NUMBER">Noto'g'ri raqam</option>
        <option value="NOT_INTERESTED">Qiziqmadi</option>
        <option value="BLACKLISTED">Qora ro'yxatda</option>
        <option value="FINISHED">Yakunlangan</option>
      </select>
      <span class="total-count" id="totalCount"></span>
    </div>

    <div id="activeBanner" class="active-banner" hidden>
      <span>Sizda band qilingan raqam bor:</span>
      <strong id="activeBannerPhone"></strong>
      <button id="activeBannerGo" class="link-btn">Ko'rish</button>
    </div>

    <main class="list" id="list"></main>

    <div id="loadMoreWrap" class="load-more-wrap" hidden>
      <button id="loadMoreBtn" class="btn-ghost">Yana yuklash</button>
    </div>

    <div id="emptyState" class="empty-state" hidden>
      <p>Hech qanday raqam topilmadi.</p>
      <p class="empty-sub">Pastdagi "+" tugmasi bilan yangi raqam qo'shing.</p>
    </div>

    <button id="addBtn" class="fab" title="Yangi raqam qo'shish">
      <svg width="22" height="22" viewBox="0 0 16 16" fill="none"><path d="M8 3V13M3 8H13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>

  </div>
</section>

<!-- ============ MODAL: YANGI RAQAM ============ -->
<div id="createModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-head">
      <h3>Yangi raqam qo'shish</h3>
      <button class="icon-btn js-close-create">&times;</button>
    </div>

    <form id="createForm">
      <label class="field">
        <span class="field-label">Telefon raqami</span>
        <div class="phone-input-wrap">
          <span class="phone-prefix">+998</span>
          <input type="text" id="cPhone" placeholder="90 123 45 67" inputmode="numeric" required>
        </div>
        <span class="field-error" id="cPhoneError" hidden>Bu O'zbekiston mobil raqami formatiga mos emas.</span>
      </label>

      <label class="field">
        <span class="field-label">Ism-familiya (ixtiyoriy)</span>
        <input type="text" id="cName" placeholder="Egasining ismi">
      </label>

      <p id="createError" class="login-error" hidden></p>

      <button type="submit" class="btn-primary btn-full">Qo'shish</button>
    </form>
  </div>
</div>

<!-- ============ MODAL: HOLAT / TAHRIRLASH ============ -->
<div id="editModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-head">
      <h3>Qo'ng'iroq natijasini belgilash</h3>
      <button class="icon-btn js-close-edit">&times;</button>
    </div>

    <div class="modal-phone-label" id="editPhoneLabel"></div>

    <form id="editForm">
      <input type="hidden" id="eId">

      <label class="field">
        <span class="field-label">Ism-familiya</span>
        <input type="text" id="eName" placeholder="Egasining ismi">
      </label>

      <label class="field">
        <span class="field-label">Holat</span>
        <select id="eStatus" required>
          <option value="NEW">Yangi</option>
          <option value="IN_PROGRESS">Jarayonda</option>
          <option value="CONNECTED">Bog'landi</option>
          <option value="NO_ANSWER">Ko'tarilmadi</option>
          <option value="BUSY">Band (liniya)</option>
          <option value="CALLBACK_REQUIRED">Qayta aloqa kerak</option>
          <option value="WRONG_NUMBER">Noto'g'ri raqam</option>
          <option value="NOT_INTERESTED">Qiziqmadi</option>
          <option value="BLACKLISTED">Qora ro'yxatda</option>
          <option value="FINISHED">Yakunlangan</option>
        </select>
      </label>

      <label class="field">
        <span class="field-label">Izoh (ixtiyoriy)</span>
        <textarea id="eDescription" rows="3" placeholder="Qo'ng'iroq haqida qisqacha izoh..."></textarea>
      </label>

      <p id="editError" class="login-error" hidden></p>

      <div class="modal-actions">
        <button type="button" id="eTakeBtn" class="btn-secondary">Band qilish</button>
        <button type="button" id="eUnlockBtn" class="btn-secondary" hidden>Bo'shatish</button>
        <button type="button" id="eDeleteBtn" class="btn-danger">O'chirish</button>
      </div>

      <button type="submit" class="btn-primary btn-full">Saqlash</button>
    </form>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
